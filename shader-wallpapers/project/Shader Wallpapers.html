<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Shader Wallpapers</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --ink: #f4f5f7;
    --ink-dim: rgba(244,245,247,0.55);
    --ink-mute: rgba(244,245,247,0.32);
    --chrome-bg: rgba(14,16,22,0.55);
    --chrome-border: rgba(255,255,255,0.08);
    --chrome-hover: rgba(255,255,255,0.06);
    --chrome-active: rgba(255,255,255,0.14);
    --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    --sans: "Inter", ui-sans-serif, system-ui, -apple-system, "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: #05060a; color: var(--ink); font-family: var(--sans); overflow: hidden; cursor: crosshair; }
  canvas#stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  /* ---------- Top label ---------- */
  .meta {
    position: fixed; top: 28px; left: 32px; z-index: 5;
    display: flex; flex-direction: column; gap: 4px;
    pointer-events: none;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-shadow: 0 1px 12px rgba(0,0,0,0.5);
  }
  .meta .num { color: var(--ink); font-size: 56px; line-height: 1; letter-spacing: -0.03em; font-family: var(--sans); font-weight: 300; text-transform: none; }
  .meta .title { color: var(--ink); font-size: 13px; letter-spacing: 0.22em; }
  .meta .sub { max-width: 320px; line-height: 1.5; text-transform: none; letter-spacing: 0.01em; font-family: var(--sans); font-size: 12px; color: var(--ink-dim); }

  /* ---------- Bottom status bar ---------- */
  .status {
    position: fixed; bottom: 24px; left: 32px; right: 32px; z-index: 5;
    display: flex; align-items: center; justify-content: space-between;
    pointer-events: none;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-mute);
  }
  .status .group { display: flex; gap: 24px; align-items: center; }
  .status .k { color: var(--ink-dim); }
  .status .v { color: var(--ink); }
  .status .dot { width: 6px; height: 6px; border-radius: 50%; background: #6ce39a; box-shadow: 0 0 8px #6ce39a; display: inline-block; margin-right: 8px; vertical-align: middle; }

  /* ---------- Right rail switcher ---------- */
  .rail {
    position: fixed; right: 24px; top: 50%; transform: translateY(-50%); z-index: 6;
    display: flex; flex-direction: column; gap: 10px;
    background: var(--chrome-bg);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--chrome-border);
    border-radius: 16px;
    padding: 12px;
  }
  .rail button {
    appearance: none; border: 1px solid transparent; background: transparent;
    color: var(--ink-dim);
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    padding: 10px 14px 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    display: flex; align-items: center; gap: 12px;
    min-width: 180px;
    transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
  }
  .rail button:hover { background: var(--chrome-hover); color: var(--ink); }
  .rail button.active { background: var(--chrome-active); color: var(--ink); border-color: rgba(255,255,255,0.16); }
  .rail button .idx { font-size: 9px; opacity: 0.55; min-width: 14px; }
  .rail button .name { flex: 1; text-align: left; }
  .rail button .swatch {
    width: 14px; height: 14px; border-radius: 4px;
    background: linear-gradient(135deg, var(--c1, #fff), var(--c2, #888));
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
  }

  /* ---------- Hint ---------- */
  .hint {
    position: fixed; bottom: 64px; left: 50%; transform: translateX(-50%); z-index: 5;
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-mute);
    pointer-events: none;
    display: flex; gap: 18px;
    opacity: 0; transition: opacity 0.4s ease;
  }
  .hint.show { opacity: 1; }
  .hint .key {
    display: inline-block;
    padding: 3px 6px;
    border: 1px solid var(--chrome-border);
    border-radius: 4px;
    margin-right: 6px;
    color: var(--ink-dim);
    background: rgba(255,255,255,0.03);
  }

  /* ---------- Corner crosshair ticks ---------- */
  .corner { position: fixed; width: 14px; height: 14px; z-index: 4; pointer-events: none; opacity: 0.4; }
  .corner::before, .corner::after { content: ""; position: absolute; background: var(--ink); }
  .corner::before { width: 100%; height: 1px; top: 50%; }
  .corner::after { height: 100%; width: 1px; left: 50%; }
  .c-tl { top: 24px; left: 24px; } .c-tr { top: 24px; right: 24px; }
  .c-bl { bottom: 24px; left: 24px; } .c-br { bottom: 24px; right: 24px; }

  @media (max-width: 720px) {
    .rail { right: 12px; padding: 8px; }
    .rail button { min-width: 130px; padding: 8px 10px; }
    .meta { left: 20px; top: 20px; }
    .meta .num { font-size: 40px; }
    .status { left: 20px; right: 20px; font-size: 9px; }
  }
</style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#05060a">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="g" cx="50%" cy="50%" r="60%">
          <stop offset="0%" stop-color="#7ad3ff" stop-opacity="0.9"/>
          <stop offset="55%" stop-color="#ae5cff" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#05060a" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <rect width="1200" height="800" fill="#05060a"/>
      <circle cx="600" cy="400" r="320" fill="url(#g)"/>
      <circle cx="600" cy="400" r="120" fill="none" stroke="#f4f5f7" stroke-opacity="0.6" stroke-width="2"/>
      <circle cx="600" cy="400" r="6" fill="#f4f5f7"/>
    </svg>
  </template>
  <canvas id="stage"></canvas>

  <div class="corner c-tl"></div>
  <div class="corner c-tr"></div>
  <div class="corner c-bl"></div>
  <div class="corner c-br"></div>

  <div class="meta">
    <div>SHADER / <span id="metaIdx">01</span></div>
    <div class="num" id="metaNum">01</div>
    <div class="title" id="metaTitle">AURORA FIELD</div>
    <div class="sub" id="metaSub">A flowing plasma horizon. Cursor bends the field; click to send a pulse.</div>
  </div>

  <div class="rail" id="rail"></div>

  <div class="hint" id="hint">
    <span><span class="key">←</span><span class="key">→</span> switch</span>
    <span><span class="key">CLICK</span> pulse</span>
    <span><span class="key">SPACE</span> freeze</span>
  </div>

  <div class="status">
    <div class="group">
      <span><span class="dot"></span><span class="k">LIVE</span></span>
      <span><span class="k">CURSOR </span><span class="v" id="sCur">0.00, 0.00</span></span>
      <span><span class="k">PULSE </span><span class="v" id="sPulse">0.00</span></span>
    </div>
    <div class="group">
      <span><span class="k">FPS </span><span class="v" id="sFps">--</span></span>
      <span><span class="k">RES </span><span class="v" id="sRes">--</span></span>
      <span><span class="k">T </span><span class="v" id="sT">0.00s</span></span>
    </div>
  </div>

<script>
/* ============================================================
   Shader Wallpapers — 5 interactive WebGL scenes
   ============================================================ */

const SHADERS = [
  {
    name: "AURORA FIELD",
    sub: "A flowing plasma horizon. Cursor bends the field; click to send a pulse.",
    swatch: ["#4cb5ff", "#ae5cff"],
    frag: `
      precision highp float;
      uniform vec2 uRes; uniform float uT; uniform vec2 uMouse; uniform float uPulse; uniform float uClickT;
      // hash & noise
      float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p){
        vec2 i = floor(p), f = fract(p);
        float a = hash(i), b = hash(i+vec2(1.,0.)), c = hash(i+vec2(0.,1.)), d = hash(i+vec2(1.,1.));
        vec2 u = f*f*(3.-2.*f);
        return mix(a,b,u.x) + (c-a)*u.y*(1.-u.x) + (d-b)*u.x*u.y;
      }
      float fbm(vec2 p){
        float v = 0., a = 0.5;
        for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.03; a *= 0.5; }
        return v;
      }
      void main(){
        vec2 uv = gl_FragCoord.xy / uRes.xy;
        vec2 p = uv*2.-1.;
        p.x *= uRes.x/uRes.y;

        vec2 m = (uMouse*2.-1.); m.x *= uRes.x/uRes.y;
        float md = length(p - m);
        float pulse = uPulse * exp(-md*1.8);

        // warp the field toward cursor
        vec2 q = p;
        q += 0.5 * (m - p) * exp(-md*1.2) * (0.4 + 0.6*sin(uT*0.7));
        q.y += 0.15*sin(uT*0.3 + p.x*1.5);

        // layered fbm
        float n1 = fbm(q*1.2 + vec2(uT*0.08, -uT*0.04));
        float n2 = fbm(q*2.4 + vec2(-uT*0.05, uT*0.12) + n1*1.4);
        float n3 = fbm(q*0.6 - vec2(uT*0.02, 0.) + n2);

        // aurora bands - vertical ribbons modulated by noise
        float band = sin(p.y*2.2 + n2*3.0 + uT*0.4) * 0.5 + 0.5;
        band = pow(band, 1.6);
        float ribbon = smoothstep(0.2, 0.95, band) * (0.6 + 0.6*n3);
        ribbon += 0.6*pulse;

        // colors - deep teal -> violet -> magenta
        vec3 c1 = vec3(0.06, 0.18, 0.32);   // deep blue
        vec3 c2 = vec3(0.10, 0.65, 0.85);   // cyan
        vec3 c3 = vec3(0.55, 0.32, 0.95);   // violet
        vec3 c4 = vec3(0.95, 0.45, 0.85);   // magenta
        vec3 col = mix(c1, c2, smoothstep(0.0, 0.5, ribbon));
        col = mix(col, c3, smoothstep(0.4, 0.85, ribbon));
        col = mix(col, c4, smoothstep(0.85, 1.1, ribbon + pulse*0.6));

        // vignette + soft glow under cursor
        col += vec3(0.35, 0.55, 0.95) * exp(-md*3.0) * 0.12;
        col *= 1.0 - 0.35*length(p)*0.4;

        // film grain
        col += (hash(uv*uT)-0.5)*0.02;

        gl_FragColor = vec4(col, 1.0);
      }
    `
  },
  {
    name: "LIQUID CHROME",
    sub: "Polished metal with chromatic ripples. Cursor pushes a soft dent; click sends a shockwave.",
    swatch: ["#cfd6e2", "#5a6378"],
    frag: `
      precision highp float;
      uniform vec2 uRes; uniform float uT; uniform vec2 uMouse; uniform float uPulse; uniform float uClickT;
      float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
      float noise(vec2 p){
        vec2 i=floor(p), f=fract(p);
        float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
        vec2 u=f*f*(3.-2.*f);
        return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
      }
      float fbm(vec2 p){ float v=0., a=0.5; for(int i=0;i<5;i++){ v+=a*noise(p); p*=2.0; a*=0.5;} return v; }
      void main(){
        vec2 uv = gl_FragCoord.xy / uRes.xy;
        vec2 p = uv*2.-1.; p.x *= uRes.x/uRes.y;
        vec2 m = uMouse*2.-1.; m.x *= uRes.x/uRes.y;
        float md = length(p-m);

        // surface height field
        float h = 0.0;
        h += 0.4*fbm(p*1.3 + uT*0.06);
        h += 0.3*sin(p.x*2.0 + uT*0.3 + fbm(p*0.8));
        // cursor dent
        h += -0.6*exp(-md*md*5.5);
        // click shockwave: expanding ring
        float ring = sin(md*18.0 - uClickT*8.0) * exp(-md*2.0) * exp(-uClickT*1.4);
        h += ring * 0.35;

        // surface normal via gradient of h
        float e = 0.01;
        float hx = h - (
            0.4*fbm((p+vec2(e,0))*1.3 + uT*0.06) +
            0.3*sin((p.x+e)*2.0 + uT*0.3 + fbm((p+vec2(e,0))*0.8)) +
            -0.6*exp(-length((p+vec2(e,0))-m)*length((p+vec2(e,0))-m)*5.5)
        );
        float hy = h - (
            0.4*fbm((p+vec2(0,e))*1.3 + uT*0.06) +
            0.3*sin(p.x*2.0 + uT*0.3 + fbm((p+vec2(0,e))*0.8)) +
            -0.6*exp(-length((p+vec2(0,e))-m)*length((p+vec2(0,e))-m)*5.5)
        );
        vec3 n = normalize(vec3(hx, hy, 0.05));

        // base chrome with strong reflections
        vec3 lightDir = normalize(vec3(0.4, 0.7, 0.6));
        float diff = clamp(dot(n, lightDir), 0., 1.);
        float spec = pow(clamp(dot(reflect(-lightDir,n), vec3(0,0,1)),0.,1.), 24.);

        // environment color stripes based on reflected y
        float env = sin(n.y*8.0 + uT*0.2)*0.5+0.5;
        vec3 envCol = mix(vec3(0.07,0.09,0.13), vec3(0.85,0.9,1.0), env);
        envCol = mix(envCol, vec3(0.95,0.7,0.55), smoothstep(0.6,1.0, env)); // warm highlight band

        // chromatic aberration on highlights
        float ca = spec;
        vec3 col = envCol * (0.55 + 0.55*diff);
        col += vec3(1.0, 0.96, 0.92) * spec * 1.4;
        col += vec3(0.4, 0.7, 1.0) * ca * 0.25;

        // pulse glow
        col += vec3(0.8,0.9,1.0) * abs(ring) * 0.8;

        // vignette
        col *= 1.0 - 0.28*length(p)*0.5;

        gl_FragColor = vec4(col, 1.0);
      }
    `
  },
  {
    name: "VORONOI CELLS",
    sub: "A living mosaic of cells. Cursor attracts the nearest points; click ripples through the lattice.",
    swatch: ["#ffb86b", "#ff5a6e"],
    frag: `
      precision highp float;
      uniform vec2 uRes; uniform float uT; uniform vec2 uMouse; uniform float uPulse; uniform float uClickT;
      vec2 hash2(vec2 p){
        p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));
        return fract(sin(p)*43758.5453);
      }
      void main(){
        vec2 uv = gl_FragCoord.xy / uRes.xy;
        vec2 p = (uv*2.-1.); p.x *= uRes.x/uRes.y;
        vec2 m = uMouse*2.-1.; m.x *= uRes.x/uRes.y;

        vec2 scaled = p * 5.0;
        vec2 i = floor(scaled);
        vec2 f = fract(scaled);

        float d1 = 8.0, d2 = 8.0;
        vec2 cellPt = vec2(0.);
        for(int y=-1;y<=1;y++){
          for(int x=-1;x<=1;x++){
            vec2 g = vec2(float(x), float(y));
            vec2 o = hash2(i+g);
            o = 0.5 + 0.5*sin(uT*0.6 + 6.2831*o);
            vec2 pt = g + o - f;

            // attract toward cursor
            vec2 worldPt = (i+g+o) / 5.0;
            worldPt.x *= uRes.y/uRes.x; // unscale aspect for distance
            float mdist = length(((i+g+o)/5.0)*vec2(2.,2.) - vec2(1.,1.) - m); // rough
            // simpler: pull cell point toward mouse direction in cell-local space
            vec2 cellWorld = (i+g+o)/5.0*2.0-1.0;
            cellWorld.x *= uRes.x/uRes.y;
            vec2 dir = m - cellWorld;
            float dl = length(dir);
            float pull = exp(-dl*1.4) * 0.4;
            pt += normalize(dir+1e-5) * pull;

            float d = length(pt);
            if(d < d1){ d2 = d1; d1 = d; cellPt = i+g; }
            else if(d < d2){ d2 = d; }
          }
        }

        // edge distance (gap between two nearest)
        float edge = d2 - d1;

        // cell color from hash
        vec3 cellHash = vec3(hash2(cellPt), hash2(cellPt+13.7).x);
        // warm palette: amber -> coral -> magenta -> deep plum
        vec3 a = vec3(0.99, 0.72, 0.32);
        vec3 b = vec3(0.99, 0.35, 0.43);
        vec3 c = vec3(0.62, 0.18, 0.55);
        vec3 dCol = vec3(0.18, 0.07, 0.22);
        float t = fract(cellHash.x + uT*0.04);
        vec3 col = mix(a,b,smoothstep(0.,0.4,t));
        col = mix(col, c, smoothstep(0.4,0.75,t));
        col = mix(col, dCol, smoothstep(0.75,1.0,t));
        col *= 0.4 + 0.6*cellHash.y;

        // click shockwave through lattice
        float md = length(p - m);
        float ring = sin(md*10.0 - uClickT*6.0) * exp(-md*1.5) * exp(-uClickT*1.0);
        col += vec3(1.0, 0.95, 0.85) * abs(ring) * 0.5;

        // dark edges between cells
        float edgeMask = smoothstep(0.0, 0.06, edge);
        col *= 0.15 + 0.85*edgeMask;

        // subtle glow near cursor
        col += vec3(1.0, 0.85, 0.7) * exp(-md*3.0) * 0.18;

        // vignette
        col *= 1.0 - 0.3*length(p)*0.55;

        gl_FragColor = vec4(col, 1.0);
      }
    `
  },
  {
    name: "STARFIELD WARP",
    sub: "A volumetric tunnel of stars. Tilt it with your cursor; click to jump to lightspeed.",
    swatch: ["#0a1a3a", "#7ad3ff"],
    frag: `
      precision highp float;
      uniform vec2 uRes; uniform float uT; uniform vec2 uMouse; uniform float uPulse; uniform float uClickT;
      float hash(vec3 p){ return fract(sin(dot(p,vec3(127.1,311.7,74.7)))*43758.5453); }

      // star at layer
      float stars(vec2 uv, float scale, float density){
        vec2 g = uv*scale;
        vec2 i = floor(g);
        vec2 f = fract(g) - 0.5;
        float h = hash(vec3(i, scale));
        if(h < 1.0 - density) return 0.0;
        vec2 off = (vec2(hash(vec3(i+1.0,scale)), hash(vec3(i+3.0,scale))) - 0.5) * 0.7;
        float d = length(f - off);
        float r = 0.02 + 0.04*hash(vec3(i+7.0,scale));
        float s = smoothstep(r, 0.0, d);
        // twinkle
        s *= 0.5 + 0.5*sin(uT*2.0 + h*30.0);
        return s;
      }

      void main(){
        vec2 uv = gl_FragCoord.xy / uRes.xy;
        vec2 p = uv*2.-1.; p.x *= uRes.x/uRes.y;
        vec2 m = uMouse*2.-1.;

        // tilt offset: parallax centered at mouse
        float boost = 1.0 + 4.0 * uPulse;

        vec3 col = vec3(0.0);
        // background nebula
        float neb = 0.0;
        neb += 0.4 * sin(p.x*1.5 + uT*0.1);
        neb += 0.4 * sin(p.y*1.7 - uT*0.07);
        vec3 nebCol = mix(vec3(0.02,0.03,0.08), vec3(0.18,0.08,0.32), 0.5+0.5*neb);
        nebCol = mix(nebCol, vec3(0.05,0.15,0.35), smoothstep(-1.,1.,neb*0.7));
        col += nebCol * 0.7;

        // multiple parallax star layers
        for(int i=0;i<6;i++){
          float fi = float(i);
          float layer = fi + 1.0;
          float speed = (0.05 + fi*0.06) * boost;
          vec2 puv = p;
          // tilt toward cursor: parallax shift increases per layer
          puv -= m * (0.04 * layer);
          // motion along z (warp): scale outward from center
          float zoom = 1.0 + speed*uT*0.2;
          puv = puv / mix(1.0, zoom, 0.0); // base
          // streak when warping
          vec2 streakDir = normalize(p + 1e-4);
          float streakLen = uPulse * (0.05 + 0.06*layer);
          float s = 0.0;
          for(int k=0;k<4;k++){
            float fk = float(k)/3.0;
            vec2 sp = puv - streakDir * streakLen * fk;
            s += stars(sp + vec2(uT*speed*0.4, -uT*speed*0.2), 6.0 + layer*2.0, 0.04) * (1.0 - fk*0.6);
          }
          vec3 sc = mix(vec3(0.8,0.9,1.0), vec3(1.0,0.85,0.7), fract(layer*0.37));
          col += sc * s * (0.4 + 0.15*layer);
        }

        // central glow (warp core)
        float md = length(p - m*0.5);
        col += vec3(0.45,0.7,1.0) * exp(-md*2.5) * (0.15 + 0.6*uPulse);

        // shockwave on click
        float md2 = length(p - m);
        float ring = sin(md2*12.0 - uClickT*10.0) * exp(-md2*1.5) * exp(-uClickT*1.4);
        col += vec3(0.6,0.85,1.0) * abs(ring) * 0.8;

        // vignette
        col *= 1.0 - 0.35*length(p)*0.55;
        gl_FragColor = vec4(col, 1.0);
      }
    `
  },
  {
    name: "GRADIENT MESH",
    sub: "A silken gradient with magnetic pull. Cursor warps the mesh; click drops a color bomb.",
    swatch: ["#ff7ab8", "#7ce5ff"],
    frag: `
      precision highp float;
      uniform vec2 uRes; uniform float uT; uniform vec2 uMouse; uniform float uPulse; uniform float uClickT;
      vec3 palette(float t){
        // smooth pastel: peach -> rose -> lavender -> mint -> sky
        vec3 a = vec3(1.0, 0.78, 0.62);
        vec3 b = vec3(0.95, 0.52, 0.72);
        vec3 c = vec3(0.62, 0.55, 0.95);
        vec3 d = vec3(0.55, 0.92, 0.85);
        vec3 e = vec3(0.48, 0.78, 1.0);
        t = fract(t);
        if(t<0.25) return mix(a,b,t/0.25);
        if(t<0.5)  return mix(b,c,(t-0.25)/0.25);
        if(t<0.75) return mix(c,d,(t-0.5)/0.25);
        return mix(d,e,(t-0.75)/0.25);
      }
      // magnetic field from a set of moving anchor points
      vec2 warp(vec2 p, float t, vec2 m){
        vec2 a1 = vec2(sin(t*0.21)*0.6, cos(t*0.17)*0.5);
        vec2 a2 = vec2(cos(t*0.13)*0.7, sin(t*0.27)*0.6);
        vec2 a3 = vec2(sin(t*0.09 + 1.5)*0.5, cos(t*0.23+2.0)*0.7);
        vec2 d1 = p - a1; vec2 d2 = p - a2; vec2 d3 = p - a3; vec2 dm = p - m;
        vec2 v = vec2(0.);
        v += normalize(d1+1e-4) * 0.12 / (0.2 + dot(d1,d1));
        v += normalize(d2+1e-4) * -0.10 / (0.2 + dot(d2,d2));
        v += normalize(d3+1e-4) * 0.08 / (0.2 + dot(d3,d3));
        // cursor as a strong attractor that swirls
        float md = length(dm)+1e-4;
        vec2 perp = vec2(-dm.y, dm.x) / md;
        v += (-dm/md) * 0.18 * exp(-md*1.2);
        v += perp * 0.18 * exp(-md*1.5);
        return v;
      }
      void main(){
        vec2 uv = gl_FragCoord.xy / uRes.xy;
        vec2 p = uv*2.-1.; p.x *= uRes.x/uRes.y;
        vec2 m = uMouse*2.-1.; m.x *= uRes.x/uRes.y;

        // integrate flow a few steps for silky look
        vec2 q = p;
        for(int i=0;i<4;i++){ q += warp(q, uT, m) * 0.25; }

        float t = 0.5 + 0.5*sin(q.x*1.2 + q.y*0.8 + uT*0.15);
        t += 0.25*sin(length(q-m)*3.0 - uT*0.4);
        vec3 col = palette(t);

        // soft pulse from click — color bomb
        float md = length(p - m);
        float bomb = exp(-md*md*4.0) * uPulse;
        vec3 bombCol = palette(uClickT*0.3 + 0.6);
        col = mix(col, bombCol, bomb*0.7);

        // very subtle grain to keep it silky-not-banded
        float gr = fract(sin(dot(uv*uRes, vec2(12.9898,78.233)))*43758.5453);
        col += (gr-0.5)*0.012;

        // soft inner glow at cursor
        col += vec3(1.0)*exp(-md*4.5)*0.08;
        // vignette
        col *= 1.0 - 0.22*length(p)*0.5;

        gl_FragColor = vec4(col, 1.0);
      }
    `
  }
];

/* ---------------- WebGL plumbing ---------------- */
const canvas = document.getElementById('stage');
const gl = canvas.getContext('webgl', { antialias: false, premultipliedAlpha: false });
if(!gl){ document.body.innerHTML = '<div style="color:#fff;padding:40px;font-family:monospace">WebGL not supported.</div>'; throw new Error('no webgl'); }

const vertSrc = `
  attribute vec2 a_pos;
  void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s), src);
    throw new Error('shader compile error');
  }
  return s;
}
function makeProgram(fragSrc){
  const v = compile(gl.VERTEX_SHADER, vertSrc);
  const f = compile(gl.FRAGMENT_SHADER, fragSrc);
  const p = gl.createProgram();
  gl.attachShader(p, v); gl.attachShader(p, f);
  gl.bindAttribLocation(p, 0, 'a_pos');
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p, gl.LINK_STATUS)){
    console.error(gl.getProgramInfoLog(p));
    throw new Error('link error');
  }
  return p;
}

// Fullscreen triangle
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

// Pre-compile all programs and cache uniform locations
const programs = SHADERS.map(s => {
  const prog = makeProgram(s.frag);
  return {
    prog,
    u: {
      uRes: gl.getUniformLocation(prog, 'uRes'),
      uT: gl.getUniformLocation(prog, 'uT'),
      uMouse: gl.getUniformLocation(prog, 'uMouse'),
      uPulse: gl.getUniformLocation(prog, 'uPulse'),
      uClickT: gl.getUniformLocation(prog, 'uClickT'),
    }
  };
});

/* ---------------- State ---------------- */
const state = {
  idx: 0,
  mouse: [0.5, 0.5],
  mouseTarget: [0.5, 0.5],
  pulse: 0.0,
  clickT: 99.0,
  startT: performance.now(),
  lastT: performance.now(),
  paused: false,
  pausedAt: 0,
  pausedOffset: 0,
};

function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if(canvas.width !== w || canvas.height !== h){
    canvas.width = w; canvas.height = h;
    gl.viewport(0,0,w,h);
  }
}
window.addEventListener('resize', resize);
resize();

window.addEventListener('pointermove', (e) => {
  state.mouseTarget[0] = e.clientX / window.innerWidth;
  state.mouseTarget[1] = 1.0 - (e.clientY / window.innerHeight);
});
window.addEventListener('pointerdown', (e) => {
  state.pulse = 1.0;
  state.clickT = 0.0;
});

window.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowRight'){ select((state.idx + 1) % SHADERS.length); }
  else if(e.key === 'ArrowLeft'){ select((state.idx - 1 + SHADERS.length) % SHADERS.length); }
  else if(e.key >= '1' && e.key <= '5'){ select(parseInt(e.key,10)-1); }
  else if(e.code === 'Space'){ e.preventDefault(); togglePause(); }
});

function togglePause(){
  state.paused = !state.paused;
  if(state.paused){ state.pausedAt = performance.now(); }
  else { state.pausedOffset += performance.now() - state.pausedAt; }
}

/* ---------------- Rail UI ---------------- */
const rail = document.getElementById('rail');
SHADERS.forEach((s, i) => {
  const b = document.createElement('button');
  b.innerHTML = `<span class="idx">0${i+1}</span><span class="name">${s.name}</span><span class="swatch" style="--c1:${s.swatch[0]};--c2:${s.swatch[1]}"></span>`;
  b.addEventListener('click', () => select(i));
  rail.appendChild(b);
});

function select(i){
  state.idx = i;
  [...rail.children].forEach((c, k) => c.classList.toggle('active', k===i));
  const s = SHADERS[i];
  document.getElementById('metaTitle').textContent = s.name;
  document.getElementById('metaSub').textContent = s.sub;
  const num = String(i+1).padStart(2,'0');
  document.getElementById('metaNum').textContent = num;
  document.getElementById('metaIdx').textContent = `${num} / ${String(SHADERS.length).padStart(2,'0')}`;
}
select(0);

// hint flashes briefly on load
const hint = document.getElementById('hint');
setTimeout(()=>hint.classList.add('show'), 400);
setTimeout(()=>hint.classList.remove('show'), 5200);

/* ---------------- Status updaters ---------------- */
const sCur = document.getElementById('sCur');
const sPulse = document.getElementById('sPulse');
const sFps = document.getElementById('sFps');
const sRes = document.getElementById('sRes');
const sT = document.getElementById('sT');
let fpsAcc = 0, fpsN = 0, fpsLast = performance.now();

/* ---------------- Render loop ---------------- */
function render(now){
  const dt = Math.min(0.05, (now - state.lastT)/1000);
  state.lastT = now;

  // smooth mouse
  state.mouse[0] += (state.mouseTarget[0] - state.mouse[0]) * Math.min(1, dt*8);
  state.mouse[1] += (state.mouseTarget[1] - state.mouse[1]) * Math.min(1, dt*8);

  // decay pulse and advance click timer
  state.pulse *= Math.exp(-dt*1.6);
  state.clickT += dt;

  const t = state.paused
    ? (state.pausedAt - state.startT - state.pausedOffset)/1000
    : (now - state.startT - state.pausedOffset)/1000;

  resize();
  const { prog, u } = programs[state.idx];
  gl.useProgram(prog);
  gl.uniform2f(u.uRes, canvas.width, canvas.height);
  gl.uniform1f(u.uT, t);
  gl.uniform2f(u.uMouse, state.mouse[0], state.mouse[1]);
  gl.uniform1f(u.uPulse, state.pulse);
  gl.uniform1f(u.uClickT, state.clickT);

  gl.drawArrays(gl.TRIANGLES, 0, 3);

  // status text (throttled)
  fpsN++;
  if(now - fpsLast > 400){
    const fps = Math.round((fpsN*1000)/(now-fpsLast));
    sFps.textContent = fps;
    sRes.textContent = `${canvas.width}×${canvas.height}`;
    fpsN = 0; fpsLast = now;
  }
  sCur.textContent = `${(state.mouse[0]*2-1).toFixed(2)}, ${(state.mouse[1]*2-1).toFixed(2)}`;
  sPulse.textContent = state.pulse.toFixed(2);
  sT.textContent = `${t.toFixed(2)}s`;

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
