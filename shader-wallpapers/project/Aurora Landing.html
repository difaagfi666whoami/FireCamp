<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<title>Campfire — Riset. Cocokkan. Kirim.</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --surface: #F5F3EF;       /* cream */
    --ink: #0D1A14;           /* deep green-black */
    --ink-soft: #4a5a52;
    --ink-mute: #8a948e;
    --teal: #0F6E56;
    --teal-deep: #0a4f3e;
    --mint: #C8EDE0;
    --gold: #C9963E;
    --forest: #0F2318;
    --forest-deep: #060E0A;

    --sans: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
    --mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--surface); color: var(--ink); font-family: var(--sans); overflow: hidden; cursor: crosshair; }
  canvas#stage { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  /* ---------- Navbar ---------- */
  .nav {
    position: fixed; top: 18px; left: 24px; right: 24px; z-index: 8;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 10px 10px 18px;
    background: rgba(245,243,239,0.72);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border: 1px solid rgba(13,26,20,0.08);
    border-radius: 999px;
  }
  .nav .left { display: flex; align-items: center; gap: 22px; }
  .nav .brand { display: flex; align-items: center; gap: 10px; }
  .nav .logo {
    width: 24px; height: 24px; border-radius: 7px;
    background: var(--teal);
    box-shadow: inset 0 -2px 0 rgba(0,0,0,0.12);
    position: relative;
  }
  .nav .logo::after {
    content: ""; position: absolute; inset: 5px;
    background: var(--mint);
    clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
  }
  .nav .name { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; color: var(--ink); }
  .nav .links { display: flex; gap: 4px; }
  .nav .links a {
    color: var(--ink-soft); text-decoration: none; font-size: 13px; font-weight: 500;
    padding: 7px 12px; border-radius: 999px; transition: color 0.18s, background 0.18s;
  }
  .nav .links a:hover { color: var(--ink); background: rgba(13,26,20,0.05); }
  .nav .right { display: flex; align-items: center; gap: 6px; }
  .nav .signin {
    color: var(--ink); text-decoration: none; font-size: 13px; font-weight: 500;
    padding: 9px 14px; border-radius: 999px;
  }
  .nav .signin:hover { background: rgba(13,26,20,0.05); }
  .nav .cta {
    background: var(--ink);
    color: var(--surface);
    padding: 9px 16px;
    font-weight: 600; font-size: 13px;
    border-radius: 999px;
    text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .nav .cta:hover { background: #1a2e23; }
  @media (max-width: 960px) { .nav .links { display: none; } .nav .signin { display: none; } }

  /* ---------- Hero ---------- */
  .hero {
    position: fixed; inset: 0; z-index: 5;
    display: flex; flex-direction: column; justify-content: center;
    padding: 100px 6vw 60px;
    pointer-events: none;
    max-width: 1500px;
    margin: 0 auto;
  }
  .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--ink-mute);
    text-transform: uppercase;
    margin: 0 0 28px;
    font-weight: 500;
  }
  .hero h1 {
    font-family: var(--sans);
    font-weight: 800;
    font-size: clamp(56px, 11vw, 168px);
    line-height: 1.0;
    letter-spacing: -0.045em;
    color: var(--ink);
    margin: 0 0 36px;
    max-width: 13ch;
  }
  .hero h1 .mark {
    display: inline-block;
    background: var(--mint);
    padding: 0.04em 0.14em 0.10em;
    margin-top: 0.10em;
    line-height: 0.95;
    vertical-align: top;
  }
  .hero p.sub {
    font-family: var(--sans);
    font-size: clamp(16px, 1.4vw, 20px);
    line-height: 1.5;
    color: var(--ink-soft);
    max-width: 36ch;
    margin: 0 0 36px;
    font-weight: 400;
  }
  .hero .ctas {
    pointer-events: auto;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 16px 26px;
    border-radius: 999px;
    font-family: var(--sans);
    font-size: 15px; font-weight: 600;
    border: 1px solid transparent;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s ease, background 0.18s ease, color 0.18s ease, border-color 0.18s ease, box-shadow 0.18s;
  }
  .btn-primary {
    background: var(--teal);
    color: var(--surface);
    box-shadow: 0 6px 20px rgba(15,110,86,0.28), inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .btn-primary:hover { background: var(--teal-deep); transform: translateY(-1px); box-shadow: 0 10px 28px rgba(15,110,86,0.36); }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border-color: rgba(13,26,20,0.22);
  }
  .btn-ghost:hover { background: rgba(13,26,20,0.05); border-color: rgba(13,26,20,0.36); }

  .hero .footnote {
    pointer-events: auto;
    position: absolute;
    left: 6vw; bottom: 36px;
    display: flex; align-items: center; gap: 12px;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.08em;
  }
  .hero .footnote .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 10px rgba(15,110,86,0.4);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{ opacity: 1; } 50%{ opacity: 0.35; } }

  .hero .meta-right {
    pointer-events: auto;
    position: absolute;
    right: 6vw; bottom: 36px;
    display: flex; align-items: center; gap: 18px;
    font-family: var(--mono); font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.08em;
  }
  .hero .meta-right .v { color: var(--ink); }

  @media (max-height: 700px) {
    .hero { padding-top: 96px; padding-bottom: 80px; justify-content: flex-start; }
    .hero .footnote, .hero .meta-right { display: none; }
  }
  @media (max-width: 720px) {
    .hero h1 { font-size: 56px; }
    .eyebrow { margin-bottom: 18px; }
    .hero .meta-right { display: none; }
  }
</style>
</head>
<body>
  <canvas id="stage"></canvas>

  <nav class="nav" aria-label="Primary">
    <div class="left">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div class="name">Campfire</div>
      </div>
      <div class="links">
        <a href="#cara">Cara Kerja</a>
        <a href="#fitur">Fitur</a>
        <a href="#harga">Harga</a>
        <a href="#docs">Docs</a>
      </div>
    </div>
    <div class="right">
      <a href="#" class="signin">Masuk</a>
      <a href="#" class="cta">Mulai Sekarang →</a>
    </div>
  </nav>

  <section class="hero">
    <div class="eyebrow">Platform Outreach B2B</div>
    <h1>Riset. Cocokkan. <span class="mark">Kirim.</span></h1>
    <p class="sub">Dari satu URL perusahaan ke inbox prospek — dalam 6 langkah terstruktur.</p>
    <div class="ctas">
      <a href="#" class="btn btn-primary">
        Masuk ke Campfire
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
      <a href="#" class="btn btn-ghost">
        Lihat cara kerjanya
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      </a>
    </div>

    <div class="footnote">
      <span class="dot"></span>
      <span>GERAKKAN KURSOR · KLIK UNTUK PULSA</span>
    </div>
    <div class="meta-right">
      <span>v2.0 · AURORA ENGINE</span>
      <span class="v">LIVE</span>
    </div>
  </section>

<script>
const canvas = document.getElementById('stage');
const gl = canvas.getContext('webgl', { antialias: false, premultipliedAlpha: false });
if(!gl){
  canvas.style.background = 'linear-gradient(135deg,#F5F3EF,#C8EDE0 60%,#0F6E56)';
} else {

const vertSrc = `attribute vec2 a_pos; void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }`;

const fragSrc = `
  precision highp float;
  uniform vec2 uRes; uniform float uT; uniform vec2 uMouse; uniform float uPulse;

  float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453); }
  float noise(vec2 p){
    vec2 i = floor(p), f = fract(p);
    float a = hash(i), b = hash(i+vec2(1.,0.)), c = hash(i+vec2(0.,1.)), d = hash(i+vec2(1.,1.));
    vec2 u = f*f*(3.-2.*f);
    return mix(a,b,u.x) + (c-a)*u.y*(1.-u.x) + (d-b)*u.x*u.y;
  }
  float fbm(vec2 p){
    float v = 0., a = 0.5;
    for(int i=0;i<5;i++){ v += a*noise(p); p *= 2.03; a *= 0.5; }
    return v;
  }

  void main(){
    vec2 uv = gl_FragCoord.xy / uRes.xy;
    vec2 p = uv*2.-1.;
    p.x *= uRes.x/uRes.y;

    vec2 m = (uMouse*2.-1.); m.x *= uRes.x/uRes.y;
    float md = length(p - m);
    float pulse = uPulse * exp(-md*1.8);

    vec2 q = p;
    q += 0.5 * (m - p) * exp(-md*1.2) * (0.4 + 0.6*sin(uT*0.7));
    q.y += 0.15*sin(uT*0.3 + p.x*1.5);

    float n1 = fbm(q*1.2 + vec2(uT*0.08, -uT*0.04));
    float n2 = fbm(q*2.4 + vec2(-uT*0.05, uT*0.12) + n1*1.4);
    float n3 = fbm(q*0.6 - vec2(uT*0.02, 0.) + n2);

    float band = sin(p.y*2.2 + n2*3.0 + uT*0.4) * 0.5 + 0.5;
    band = pow(band, 1.6);
    float ribbon = smoothstep(0.2, 0.95, band) * (0.6 + 0.6*n3);
    ribbon += 0.6*pulse;

    // Campfire cream palette:
    vec3 surface = vec3(0.961, 0.953, 0.937);  // #F5F3EF cream
    vec3 mint    = vec3(0.784, 0.929, 0.878);  // #C8EDE0 mint
    vec3 teal    = vec3(0.059, 0.431, 0.337);  // #0F6E56 teal
    vec3 gold    = vec3(0.788, 0.588, 0.243);  // #C9963E gold
    vec3 forest  = vec3(0.059, 0.137, 0.094);  // #0F2318 forest

    // Base: cream. Aurora paints translucent mint -> teal -> forest ribbons.
    vec3 col = surface;
    col = mix(col, mint,   smoothstep(0.15, 0.55, ribbon) * 0.85);
    col = mix(col, teal,   smoothstep(0.55, 0.95, ribbon) * 0.55);
    col = mix(col, forest, smoothstep(0.90, 1.15, ribbon + pulse*0.5) * 0.50);

    // gold accent in the brightest pockets
    float goldMask = smoothstep(0.75, 1.0, ribbon) * (0.5 + 0.5*sin(uT*0.5 + n3*4.0));
    col = mix(col, gold, goldMask * 0.18);

    // cursor halo — soft teal glow that gently darkens cream
    col = mix(col, teal, exp(-md*4.0) * 0.18);
    col += vec3(0.15, 0.32, 0.26) * exp(-md*6.5) * 0.08 * (1.0 + 2.0*uPulse);

    // soft outward vignette toward warmer cream for paper feel
    vec3 paper = vec3(0.945, 0.933, 0.910);
    col = mix(col, paper, smoothstep(0.4, 1.6, length(p)) * 0.25);

    // gentle film grain to keep the cream surface organic
    col += (hash(uv*uT + 1.7) - 0.5) * 0.012;

    gl_FragColor = vec4(col, 1.0);
  }
`;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s));
    throw new Error('shader compile error');
  }
  return s;
}
const v = compile(gl.VERTEX_SHADER, vertSrc);
const f = compile(gl.FRAGMENT_SHADER, fragSrc);
const prog = gl.createProgram();
gl.attachShader(prog, v); gl.attachShader(prog, f);
gl.bindAttribLocation(prog, 0, 'a_pos');
gl.linkProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

const u = {
  uRes: gl.getUniformLocation(prog, 'uRes'),
  uT: gl.getUniformLocation(prog, 'uT'),
  uMouse: gl.getUniformLocation(prog, 'uMouse'),
  uPulse: gl.getUniformLocation(prog, 'uPulse'),
};

const state = {
  mouse: [0.7, 0.55],
  mouseTarget: [0.7, 0.55],
  pulse: 0.0,
  startT: performance.now(),
  lastT: performance.now(),
};

function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if(canvas.width !== w || canvas.height !== h){
    canvas.width = w; canvas.height = h;
    gl.viewport(0,0,w,h);
  }
}
window.addEventListener('resize', resize);
resize();

window.addEventListener('pointermove', (e) => {
  state.mouseTarget[0] = e.clientX / window.innerWidth;
  state.mouseTarget[1] = 1.0 - (e.clientY / window.innerHeight);
});
window.addEventListener('pointerdown', () => { state.pulse = 1.0; });

function render(now){
  const dt = Math.min(0.05, (now - state.lastT)/1000);
  state.lastT = now;

  state.mouse[0] += (state.mouseTarget[0] - state.mouse[0]) * Math.min(1, dt*8);
  state.mouse[1] += (state.mouseTarget[1] - state.mouse[1]) * Math.min(1, dt*8);

  state.pulse *= Math.exp(-dt*1.6);
  const t = (now - state.startT)/1000;

  resize();
  gl.useProgram(prog);
  gl.uniform2f(u.uRes, canvas.width, canvas.height);
  gl.uniform1f(u.uT, t);
  gl.uniform2f(u.uMouse, state.mouse[0], state.mouse[1]);
  gl.uniform1f(u.uPulse, state.pulse);

  gl.drawArrays(gl.TRIANGLES, 0, 3);
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

}
</script>
</body>
</html>
